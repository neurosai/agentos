openapi: 3.1.0
info:
  title: AgentOS Common Components
  version: 0.1.0
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - invalid_request
                - unauthenticated
                - forbidden
                - not_found
                - conflict
                - policy_denied
                - rate_limited
                - backend_unavailable
            message:
              type: string
            requestId:
              type: string
            retryable:
              type: boolean
            details:
              type: object
              additionalProperties: true
    TaskStatus:
      type: string
      enum:
        - CREATED
        - ACCEPTED
        - RUNNING
        - WAITING_INPUT
        - WAITING_APPROVAL
        - COMPLETED
        - FAILED
        - CANCELLED
    MemoryType:
      type: string
      enum:
        - task
        - session
        - workspace
        - catalog_fact
        - user_pref
        - evidence
