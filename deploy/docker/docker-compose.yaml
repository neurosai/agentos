services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos
      POSTGRES_DB: agentos
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos -d agentos"]
      interval: 5s
      timeout: 5s
      retries: 10

  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "/policies"]
    volumes:
      - ../../policies:/policies:ro
    ports:
      - "8181:8181"

  otel-collector:
    image: otel/opentelemetry-collector:0.115.1
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ../otelcol/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
