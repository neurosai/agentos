listen: ":8080"

database:
  url: "postgres://agentos:agentos@localhost:5432/agentos?sslmode=disable"
  auto_migrate: true

opa:
  url: "http://localhost:8181"

tools:
  registry: "deploy/tools.yaml"

dev:
  tenant_id: "tenant:dev"
  subject_id: "user:dev"
  subject_roles:
    - engineer
  subject_groups:
    - group:team-payments
    - group:team-platform
  bearer_token: "dev-token"
